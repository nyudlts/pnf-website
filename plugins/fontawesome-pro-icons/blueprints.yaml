name: Fontawesome Pro Icons
slug: fontawesome-pro-icons
type: plugin
version: 0.1.0
description: Helper to use Fontawesome Pro Icons
icon: plug
author:
  name: Trilby Media
  email: hello@trilby.media
homepage: https://github.com/trilbymedia/grav-plugin-fontawesome-pro-icons
demo: http://demo.yoursite.com
keywords: grav, plugin, etc
bugs: https://github.com/trilbymedia/grav-plugin-fontawesome-pro-icons/issues
docs: https://github.com/trilbymedia/grav-plugin-fontawesome-pro-icons/blob/develop/README.md
license: MIT

dependencies:
  - { name: grav, version: '>=1.6.0' }

form:
  validation: loose
  fields:
    enabled:
      type: toggle
      label: PLUGIN_ADMIN.PLUGIN_STATUS
      highlight: 1
      default: 0
      options:
        1: PLUGIN_ADMIN.ENABLED
        0: PLUGIN_ADMIN.DISABLED
      validate:
        type: bool
    text_var:
      type: text
      label: PLUGIN_FONTAWESOME_PRO_ICONS.TEXT_VARIABLE
      help: PLUGIN_FONTAWESOME_PRO_ICONS.TEXT_VARIABLE_HELP
