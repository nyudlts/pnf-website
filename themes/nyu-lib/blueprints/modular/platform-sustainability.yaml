              label: Prose Classes
              toggleable: true
              ordering@: 8

            header.content_classes:
              type: text
              label: Content Classes
              toggleable: true
              ordering@: 9

            header.h1_classes:
              type: text
              label: H1 Classes
              toggleable: true
              ordering@: 10

            header.h2_classes:
              type: text
              label: H2 Classes
              toggleable: true
              ordering@: 11

            header.verify_url:
              type: text
              label: Verify URL Base
