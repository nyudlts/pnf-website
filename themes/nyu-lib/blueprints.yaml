name: Rochen
slug: rochen
type: theme
version: 0.1.0
description: Custom Grav Theme for Rochen
icon: rebel
author:
  name: Trilby Media
  email: hello@trilby.media
homepage: https://github.com/trilbymedia/grav-theme-rochen
demo: http://demo.yoursite.com
keywords: grav, theme, etc
bugs: https://github.com/trilbymedia/grav-theme-rochen/issues
readme: https://github.com/trilbymedia/grav-theme-rochen/blob/develop/README.md
license: MIT

dependencies:
  - { name: grav, version: '>=1.6.0' }

form:
    validation: loose
    fields:
        dropdown.enabled:
            type: toggle
            label: Dropdown in Menu
            highlight: 1
            default: 1
            options:
                1: PLUGIN_ADMIN.ENABLED
                0: PLUGIN_ADMIN.DISABLED
            validate:
                type: bool
        production:
            type: toggle
            label: Production Mode
            highlight: 1
            default: 1
            options:
                1: PLUGIN_ADMIN.ENABLED
                0: PLUGIN_ADMIN.DISABLED
            validate:
                type: bool
